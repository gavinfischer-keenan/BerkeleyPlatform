services:
  # ── Infrastructure (Node 01 — Control Plane) ─────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: berkeley-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT
      - "9001:9001"     # WebSocket (for dashboard MQTT bridge)
    volumes:
      - ./services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  influxdb:
    image: influxdb:2.7
    container_name: berkeley-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-berkeley2024}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-berkeley}
      DOCKER_INFLUXDB_INIT_BUCKET: sensors-raw
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  # ── Vision / NVR (Node 01 — requires Google Coral USB TPU) ───────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: berkeley-frigate
    restart: unless-stopped
    privileged: true          # required for Coral USB and video devices
    shm_size: "128mb"
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD:-changeme}
    devices:
      - /dev/bus/usb:/dev/bus/usb   # Google Coral USB TPU
    volumes:
      - ./services/frigate/config.yml:/config/config.yml
      - video-data:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5000:5000"     # Frigate web UI
      - "8554:8554"     # RTSP re-streams
    depends_on: [mosquitto]

  #   environment:
  #     WHISPER_MODEL: base-int8
  #   ports:
  #     - "10300:10300"  # Wyoming protocol
  #   depends_on: [mosquitto]

  # ── AI Agents (Node 01 — Control Plane) ──────────────────────────────
  earthquake-engine:
    build:
      context: ../EarthquakePredictionEngine
      dockerfile: Dockerfile
    container_name: berkeley-eqengine
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_ENABLED: "true"
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    network_mode: host  # needs UDP access to Raspberry Shake

  environmental-station:
    build:
      context: ../BerkeleyEnvironmental
      dockerfile: Dockerfile
    container_name: berkeley-envstation
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]

  audio-receiver:
    build:
      context: ../BerkeleyAudioReceiver
      dockerfile: Dockerfile
    container_name: berkeley-audio
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_ENABLED: "true"
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    volumes:
      - audio-data:/app/data/audio

  home-sensors:
    build:
      context: ../BerkeleyHomeSensors
      dockerfile: Dockerfile
    container_name: berkeley-homesensors
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]

  tracker:
    build:
      context: ../BerkeleyTracker
      dockerfile: Dockerfile
    container_name: berkeley-tracker
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]
    network_mode: host  # needs USB access to RTL-SDR dongles
    privileged: true     # RTL-SDR USB device access
    volumes:
      - photo-data:/data/photos

  # ── Alarm Service (Node 01) ───────────────────────────────────────────────
  alarm-service:
    build:
      context: ../BerkeleyAlarms
      dockerfile: Dockerfile
    container_name: berkeley-alarms
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    ports:
      - "8084:8084"     # Alarm Console dashboard UI
    volumes:
      - alarm-data:/var/lib/berkeley

  # ── Message Service (Node 01) ────────────────────────────────────────────────
  message-service:
    build:
      context: ../BerkeleyMessages
      dockerfile: Dockerfile
    container_name: berkeley-messages
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    ports:
      - "8085:8085"     # Message Inbox UI
    volumes:
      - message-data:/var/lib/berkeley

  # ── Node 02 Services (Compute Node — run separately on GFCANADA) ──────
  # In production, Ollama and correlation agents run on Node 02 under Proxmox VE.
  # See ARCHITECTURE.md for the full Node 02 LXC/VM layout.
  # A separate docker-compose.node02.yml will be added to manage Node 02 services.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: berkeley-ollama
  #   restart: unless-stopped
  #   runtime: nvidia          # NVIDIA container toolkit required
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #   ports:
  #     - "11434:11434"        # Ollama REST API
  #   volumes:
  #     - ollama-models:/root/.ollama   # 1 TB Gen 4 NVMe mount in production

  # ── Future Vision Agent (Node 01) ────────────────────────────────────
  # vision-agent:
  #   build: ../BerkeleyVisionAgent
  #   depends_on: [mosquitto, frigate]

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  influxdb-config:
  audio-data:
  photo-data:
  video-data:
  alarm-data:
  message-data:
