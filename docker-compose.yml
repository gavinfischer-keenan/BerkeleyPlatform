services:
  # ══════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — Node 01 Control Plane (Dell OptiPlex SFF)
  # Intel Core i7-8700 | 32 GB RAM | 256 GB SSD (boot) | 4 TB Surveillance HDD
  # ══════════════════════════════════════════════════════════════════════════════

  # ── MQTT Broker ──────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: berkeley-mosquitto
    restart: unless-stopped
    labels:
      - "node=node01"
    ports:
      - "1883:1883"     # MQTT — ESP32 firmware + Python agents
      - "9001:9001"     # WebSocket — BerkeleyHouse dashboard MQTT bridge
    volumes:
      # Config (read-only — contains password file path reference)
      - ./services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Password file — generated via mosquitto_passwd before first run
      - ./services/mosquitto/passwd:/mosquitto/config/passwd:ro
      # Absolute host paths — telemetry survives container teardowns
      - /opt/berkeley/mosquitto/data:/mosquitto/data
      - /opt/berkeley/mosquitto/log:/mosquitto/log

  # ── Time-Series Database ─────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: berkeley-influxdb
    restart: unless-stopped
    labels:
      - "node=node01"
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-berkeley}
      DOCKER_INFLUXDB_INIT_BUCKET: sensors-raw
    volumes:
      # Absolute host paths on 4 TB surveillance HDD — data persists across teardowns
      - /mnt/surveillance/influxdb/data:/var/lib/influxdb2
      - /mnt/surveillance/influxdb/config:/etc/influxdb2

  # ── Frigate NVR — Hardware-Accelerated Vision ────────────────────────────────
  # Dell OptiPlex SFF hardware:
  #   Intel Quick Sync Video (i7-8700) → /dev/dri/renderD128
  #   Google Coral USB TPU             → /dev/bus/usb
  #   4 TB Surveillance HDD            → /mnt/surveillance/frigate
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: berkeley-frigate
    restart: unless-stopped
    labels:
      - "node=node01"
    privileged: true          # required for Coral USB + DRI device access
    shm_size: "256mb"         # increased for multi-camera Intel Quick Sync decode buffer
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
      # Enable Intel Quick Sync hardware decoding via VAAPI
      LIBVA_DRIVER_NAME: i965
    devices:
      # Intel Quick Sync Video — hardware decode/encode via VAAPI
      - /dev/dri/renderD128:/dev/dri/renderD128
      # Google Coral USB TPU — object detection inference
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./services/frigate/config.yml:/config/config.yml:ro
      # 4 TB Surveillance HDD — recordings, clips, snapshots
      - /mnt/surveillance/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5000:5000"     # Frigate web UI
      - "8554:8554"     # RTSP re-streams
    depends_on: [mosquitto]

  # ══════════════════════════════════════════════════════════════════════════════
  # AI AGENTS — Node 01 Control Plane
  # ══════════════════════════════════════════════════════════════════════════════

  earthquake-engine:
    build:
      context: ../EarthquakePredictionEngine
      dockerfile: Dockerfile
    container_name: berkeley-eqengine
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_ENABLED: "true"
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    network_mode: host  # needs UDP access to Raspberry Shake on LAN

  environmental-station:
    build:
      context: ../BerkeleyEnvironmental
      dockerfile: Dockerfile
    container_name: berkeley-envstation
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]

  audio-receiver:
    build:
      context: ../BerkeleyAudioReceiver
      dockerfile: Dockerfile
    container_name: berkeley-audio
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_ENABLED: "true"
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    volumes:
      - /opt/berkeley/audio:/app/data/audio

  home-sensors:
    build:
      context: ../BerkeleyHomeSensors
      dockerfile: Dockerfile
    container_name: berkeley-homesensors
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]

  tracker:
    build:
      context: ../BerkeleyTracker
      dockerfile: Dockerfile
    container_name: berkeley-tracker
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      INFLUXDB_URL: http://influxdb:8086
    depends_on: [mosquitto, influxdb]
    network_mode: host  # needs USB access to RTL-SDR dongles
    privileged: true     # RTL-SDR USB device access
    volumes:
      - /opt/berkeley/tracker/photos:/data/photos

  # ── Alarm Service ─────────────────────────────────────────────────────────────
  alarm-service:
    build:
      context: ../BerkeleyAlarms
      dockerfile: Dockerfile
    container_name: berkeley-alarms
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    ports:
      - "8084:8084"     # Alarm Console dashboard UI
    volumes:
      - /opt/berkeley/alarms:/var/lib/berkeley

  # ── Message Service ───────────────────────────────────────────────────────────
  message-service:
    build:
      context: ../BerkeleyMessages
      dockerfile: Dockerfile
    container_name: berkeley-messages
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
    depends_on: [mosquitto]
    ports:
      - "8085:8085"     # Message Inbox UI
    volumes:
      - /opt/berkeley/messages:/var/lib/berkeley

  # ── Dashboard ─────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../BerkeleyDashboard
      dockerfile: Dockerfile
    container_name: berkeley-dashboard
    restart: unless-stopped
    labels:
      - "node=node01"
    env_file: .env
    environment:
      MQTT_BROKER: mosquitto
      ALARMS_API_URL: http://alarm-service:8084
      MESSAGES_API_URL: http://message-service:8085
    depends_on: [mosquitto, alarm-service, message-service]
    ports:
      - "8090:8090"   # Internal dashboard (LAN) + Public site entry point
    # nginx routes:
    #   home.mosswood.internal → all paths → :8090
    #   mosswood.science       → /public/* only → :8090

  # ══════════════════════════════════════════════════════════════════════════════
  # NODE 02 SERVICES — Compute Node (Gigabyte GFCANADA, RTX 4080 SUPER)
  # Run separately via docker-compose.node02.yml on Node 02.
  # See ARCHITECTURE.md for the full Node 02 LXC/VM layout.
  # ══════════════════════════════════════════════════════════════════════════════
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: berkeley-ollama
  #   restart: unless-stopped
  #   runtime: nvidia
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - /mnt/nvme-ai/ollama:/root/.ollama

  # ── Future Vision Agent (Node 01) ─────────────────────────────────────────────
  # vision-agent:
  #   build: ../BerkeleyVisionAgent
  #   depends_on: [mosquitto, frigate]

# Named volumes removed — all critical data now uses absolute host paths.
# Remaining named volumes only for non-critical ephemeral state.
volumes: {}
