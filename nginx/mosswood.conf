# =============================================================================
# nginx — Node 01 virtual host configuration
# Berkeley Home Intelligence Platform
#
# Deployment:
#   Copy this file to /etc/nginx/sites-available/mosswood
#   ln -s /etc/nginx/sites-available/mosswood /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Hosts handled:
#   home.mosswood.internal  — Internal dashboard (ALL routes → :8090)
#   mosswood.science        — Public science site (/public/* only → :8090)
#
# Security model:
#   Internal vhost is bound to the LAN interface (192.168.x.x) only —
#   or restricted by nginx allow/deny. VPN clients hit it via WireGuard.
#   Public vhost proxies ONLY /public/* and /api/public/* — the upstream
#   app also enforces this via _is_public_topic() on the WebSocket feed,
#   giving us defense-in-depth.
#
# TLS:
#   Internal: self-signed cert issued by mosswood-ca (local CA)
#   Public:   Let's Encrypt via certbot (certbot --nginx -d mosswood.science)
# =============================================================================

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Applied to public site only — internal is LAN-only and trusted
limit_req_zone $binary_remote_addr zone=public_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=public_ws:10m  rate=5r/m;

# ── Upstream: BerkeleyDashboard ───────────────────────────────────────────────
upstream berkeley_dashboard {
    server 127.0.0.1:8090;
    keepalive 8;
}

# =============================================================================
# INTERNAL VHOST — home.mosswood.internal
# Serves: ALL dashboard routes including /internal/, /api/internal/*, /ws/internal
# Access: LAN subnet + WireGuard VPN only
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name home.mosswood.internal;

    # ── TLS — self-signed / local CA ─────────────────────────────────────────
    ssl_certificate     /etc/ssl/mosswood/internal.crt;
    ssl_certificate_key /etc/ssl/mosswood/internal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Access control: LAN + WireGuard VPN only ─────────────────────────────
    # Adjust subnet to match your LAN and WireGuard interface
    allow 192.168.1.0/24;    # LAN subnet
    allow 10.10.0.0/24;      # WireGuard VPN subnet
    allow 127.0.0.1;          # localhost
    deny all;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header Referrer-Policy           "strict-origin"    always;

    # ── Root redirect → /internal/ ────────────────────────────────────────────
    location = / {
        return 302 /internal/;
    }

    # ── WebSocket: /ws/internal ───────────────────────────────────────────────
    location /ws/internal {
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── All other traffic → dashboard ─────────────────────────────────────────
    location / {
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mosswood-internal-access.log;
    error_log  /var/log/nginx/mosswood-internal-error.log warn;
}

# HTTP redirect for internal
server {
    listen 80;
    server_name home.mosswood.internal;
    return 301 https://$host$request_uri;
}


# =============================================================================
# PUBLIC VHOST — mosswood.science
# Serves: ONLY /public/*, /api/public/*, /ws/public
# Access: Anyone on the internet
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mosswood.science www.mosswood.science;

    # ── TLS — Let's Encrypt ───────────────────────────────────────────────────
    # Run: certbot --nginx -d mosswood.science -d www.mosswood.science
    ssl_certificate     /etc/letsencrypt/live/mosswood.science/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mosswood.science/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' wss://mosswood.science; img-src 'self' data:;"
        always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/json application/javascript;
    gzip_min_length 256;

    # ── Root → public index ───────────────────────────────────────────────────
    location = / {
        return 302 /public/;
    }

    # ── WebSocket: /ws/public (rate-limited) ─────────────────────────────────
    location /ws/public {
        limit_req zone=public_ws burst=3 nodelay;
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Public API (rate-limited) ─────────────────────────────────────────────
    location /api/public/ {
        limit_req zone=public_api burst=10 nodelay;
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_cache_valid  200 10s;  # light caching for env data
    }

    # ── Public static SPA ─────────────────────────────────────────────────────
    location /public/ {
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API status endpoint (health check for uptime monitors) ───────────────
    location = /api/status {
        limit_req zone=public_api burst=5 nodelay;
        proxy_pass         http://berkeley_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
    }

    # ── Block ALL other paths — no leaking internal routes ────────────────────
    location / {
        return 403 "Not available on public site.";
    }

    # ── Let's Encrypt ACME challenge ──────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mosswood-public-access.log;
    error_log  /var/log/nginx/mosswood-public-error.log warn;
}

# HTTP redirect for public
server {
    listen 80;
    server_name mosswood.science www.mosswood.science;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://mosswood.science$request_uri;
    }
}
