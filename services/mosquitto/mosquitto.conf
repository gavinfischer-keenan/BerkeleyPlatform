# Mosquitto MQTT Broker Configuration
# Berkeley Home Intelligence Platform — Node 01 (Dell OptiPlex SFF)
# Rev: Phase 2 — password authentication enforced, anonymous access disabled.
#
# Password file must be generated before starting the container:
#   docker exec berkeley-mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>
# Or pre-generate with:
#   mosquitto_passwd -c services/mosquitto/passwd <username>
# Then add subsequent users with (no -c flag to avoid overwriting):
#   mosquitto_passwd services/mosquitto/passwd <username2>

# ── Listeners ────────────────────────────────────────────────────────────────
# MQTT over TCP — all agents and ESP32 firmware connect here
listener 1883
protocol mqtt

# MQTT over WebSocket — BerkeleyHouse dashboard MQTT bridge connects here
listener 9001
protocol websockets

# ── Security ─────────────────────────────────────────────────────────────────
# Anonymous access is DISABLED. All clients must supply valid credentials.
# ESP32 devices: set mqtt_username / mqtt_password in esphome secrets.yaml
# Python agents: set MQTT_USERNAME / MQTT_PASSWORD in .env
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────────────────
# Retained messages (agent heartbeats, LWT offline status) survive broker restart.
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Message Queuing ──────────────────────────────────────────────────────────
# Tuned for 9-sensor E-Nose matrix at 5s cadence + station batch at 60s cadence.
# Concurrent seismic + environmental + gas + leak + power feeds → generous queue.
max_inflight_messages 40
max_queued_messages 2000

# ── Keep-Alive ───────────────────────────────────────────────────────────────
# ESP32 devices use keepalive=60. Allow 1.5× grace before LWT fires.
keepalive_interval 90
