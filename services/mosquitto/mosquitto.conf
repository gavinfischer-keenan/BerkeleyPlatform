# Mosquitto MQTT Broker Configuration
# Berkeley Home Intelligence Platform

# ── Listeners ────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Security ─────────────────────────────────────────────────────────
# Allow anonymous for local LAN (all agents are trusted)
# Add authentication when exposing externally
allow_anonymous true

# ── Persistence ──────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice

# ── Retained Messages ───────────────────────────────────────────────
# Agent status messages use retain=true so new subscribers
# immediately see which agents are online/offline
max_inflight_messages 20
max_queued_messages 1000
